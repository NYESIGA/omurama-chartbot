name: Deploy Omurama AI Assistant

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install pytest
        run: |
          pip install pytest

      - name: Test application
        run: |
          pytest tests || echo "No tests found"

      - name: Check Python syntax
        run: |
          python -m compileall .

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://Nyesiga:$HF_TOKEN@huggingface.co/spaces/Nyesiga/omurama-ai-platform space_repo

          rsync -av --exclude='.git' --exclude='.github' ./ space_repo/

          cd space_repo

          git add .
          git commit -m "Auto deployment from GitHub" || echo "No changes to commit"
          git push